<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的技术小站</title>
    <!-- 好看免费字体 -->
    <link rel="stylesheet" href="https://fonts.loli.net/css2?family=Inter:wght@400;500;700&display=swap">
    <style>
        body{
            text-align:center;
            margin-top:50px;
            font-family:"Inter",微软雅黑,sans-serif;
            background:#0a0a1a;
            color:#fff;
            overflow-x:hidden;
            cursor: none;
            transition: all 0.3s ease;
        }
        h1{
            font-size:36px;
            margin-bottom:10px;
        }
        p.desc{
            color:#aaa;
            font-size:16px;
            margin-bottom:40px;
        }
        /* 按钮导航 */
        .nav-btn{
            display:inline-block;
            width:260px;
            padding:14px 0;
            margin:12px;
            font-size:18px;
            text-decoration:none;
            color:#fff;
            background:#192a48;
            border-radius:12px;
            transition:all 0.3s ease;
        }
        .nav-btn:hover{
            background:#0066cc;
            transform:translateY(-4px);
            box-shadow:0 8px 20px #00449966;
        }
        #starfield{
            position:fixed;
            top:0;
            left:0;
            width:100vw;
            height:100vh;
            z-index:-1;
        }
        .cursor {
            width:16px; height:16px; border-radius:50%; background:#fff;
            position:fixed; pointer-events:none; z-index:9999;
            transform:translate(-50%,-50%); mix-blend-mode:difference;
        }
        .cursor-trail {
            width:8px; height:8px; border-radius:50%; background:#66ccff;
            position:fixed; pointer-events:none; z-index:9998;
            opacity:0.8; transform:translate(-50%,-50%);
        }
        #live2d{
            position: fixed; right:15px; bottom:15px; z-index:999;
            width:280px; height:350px; pointer-events:auto;
        }
        /* 音乐按钮 */
        .music-btn{
            position:fixed; top:20px; right:20px;
            width:40px; height:40px; background:#192a48;
            border:none; border-radius:50%; color:#fff;
            font-size:18px; cursor:pointer; z-index:9999;
            transition:0.3s;
        }
        .music-btn:hover{ background:#0066cc; }
        /* 语言切换按钮 */
        .lang-btn{
            position:fixed; top:20px; left:20px;
            width:50px; height:40px; background:#192a48;
            border:none; border-radius:8px; color:#fff;
            font-size:16px; cursor:pointer; z-index:9999;
            transition:0.3s;
        }
        .lang-btn:hover{ background:#0066cc; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/live2d-widget@3.1.4/lib/L2Dwidget.min.js"></script>
</head>
<body>
    <canvas id="starfield"></canvas>
    <div class="cursor"></div>
    <div class="cursor-trail"></div>
    <div id="live2d"></div>

    <!-- 语言按钮 + 音乐按钮 -->
    <button class="lang-btn" onclick="toggleLang()">中/EN</button>
    <button class="music-btn" onclick="toggleMusic()">🎵</button>

    <!-- 全部文字加 data-i18n 标记 -->
    <h1 data-i18n="title">欢迎来到我的技术小站</h1>
    <p class="desc" data-i18n="subtitle">怀旧系统科普 | Windows历史 | 电脑基础知识</p>

    <div>
        <a href="winold.html" class="nav-btn" data-i18n="nav1">怀旧系统介绍</a>
    </div>
    <div>
        <a href="download.html" class="nav-btn" data-i18n="nav2">WinXP/2000 网盘下载</a>
    </div>
    <div>
        <a href="message.html" class="nav-btn" data-i18n="nav3">留言板</a>
    </div>
    <div>
        <a href="about.html" class="nav-btn" data-i18n="nav4">关于本站</a>
    </div>

    <audio id="bgm" loop>
        <source src="https://mir.sityye.com/music/nostalgia.mp3" type="audio/mpeg">
    </audio>

<script>
// ======================================
// 双语数据
const translations = {
    cn: {
        title: "欢迎来到我的技术小站",
        subtitle: "怀旧系统科普 | Windows历史 | 电脑基础知识",
        nav1: "怀旧系统介绍",
        nav2: "WinXP/2000 网盘下载",
        nav3: "留言板",
        nav4: "关于本站"
    },
    en: {
        title: "Welcome to My Tech Site",
        subtitle: "Retro OS | Windows History | PC Basics",
        nav1: "Retro OS Intro",
        nav2: "WinXP/2000 Download",
        nav3: "Guestbook",
        nav4: "About"
    }
};

let currentLang = "cn";
function toggleLang() {
    currentLang = currentLang === "cn" ? "en" : "cn";
    document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        el.innerText = translations[currentLang][key];
    });
}
// ======================================

// 三语欢迎
alert("你好\nHello\nBonjour");

// 星空背景
const canvas=document.getElementById('starfield'); const ctx=canvas.getContext('2d'); let stars=[];
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resizeCanvas);resizeCanvas();
class Star{constructor(){this.reset();}reset(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.speed=Math.random()*0.5+0.1;this.size=Math.random()*1.5+0.5;}update(){if(this.x<0)this.reset();this.x-=this.speed;}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.8)';ctx.fill();}}
for(let i=0;i<150;i++)stars.push(new Star());
function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(s=>{s.update();s.draw();});requestAnimationFrame(animate);}animate();

// 鼠标
const cursor=document.querySelector('.cursor'); const trail=document.querySelector('.cursor-trail');
let mouseX=0,mouseY=0,trailX=0,trailY=0;
document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
function animateCursor(){cursor.style.left=mouseX+'px';cursor.style.top=mouseY+'px';trailX+=(mouseX-trailX)*0.15;trailY+=(mouseY-trailY)*0.15;trail.style.left=trailX+'px';trail.style.top=trailY+'px';requestAnimationFrame(animateCursor);}animateCursor();

// 点击花瓣
document.addEventListener('click',function(e){
    let colors=['#ff8fab','#ffc2d1','#dee2ff','#ffd6a5','#fdffb6'];
    for(let i=0;i<30;i++){
        let p=document.createElement('div'); let s=Math.random()*10+8;
        p.style.cssText=`position:fixed;width:${s}px;height:${s}px;left:${e.clientX}px;top:${e.clientY}px;background:${colors[Math.floor(Math.random()*5)]};border-radius:50% 50% 0 50%;transform:rotate(${Math.random()*360}deg);z-index:99999;pointer-events:none;transition:all 1s ease;`;
        document.body.appendChild(p);
        setTimeout(()=>{p.style.opacity=0;p.style.left=e.clientX+Math.random()*60-30+'px';p.style.top=e.clientY+Math.random()*60-30+'px';},10);
        setTimeout(()=>p.remove(),1000);
    }
});

// Live2D
L2Dwidget.init({model:{jsonPath:"https://cdn.jsdelivr.net/npm/live2d-widget-model-miku@1.0.5/assets/miku.model.json"},display:{position:"right",width:280,height:350},mobile:{show:true},log:false});

// 音乐
const bgm=document.getElementById("bgm"); let playing=false;
function toggleMusic(){if(!playing){bgm.play();playing=true;document.querySelector(".music-btn").innerText="🔇";}else{bgm.pause();playing=false;document.querySelector(".music-btn").innerText="🎵";}}
</script>
</body>
</html>
