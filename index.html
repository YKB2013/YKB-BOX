<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的技术小站</title>
    <style>
        body{
            text-align:center;
            margin-top:50px;
            font-family:微软雅黑;
            background:#0a0a1a;
            color:#fff;
            overflow-x:hidden;
            cursor: none;
        }
        a{
            display:inline-block;
            margin:20px;
            font-size:20px;
            text-decoration:none;
            color:#66ccff;
        }
        a:hover{
            color:#ff4444;
        }
        p{
            color:#aaa;
        }
        #starfield{
            position:fixed;
            top:0;
            left:0;
            width:100vw;
            height:100vh;
            z-index:-1;
        }
        .cursor {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
        }
        .cursor-trail {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #66ccff;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.8;
            transform: translate(-50%, -50%);
        }
        #live2d{
            position: fixed;
            right: 15px;
            bottom: 15px;
            z-index: 999;
            width: 280px;
            height: 350px;
            pointer-events: auto;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/live2d-widget@3.1.4/lib/L2Dwidget.min.js"></script>
</head>
<body>
    <canvas id="starfield"></canvas>
    <div class="cursor"></div>
    <div class="cursor-trail"></div>
    <div id="live2d"></div>

    <h1>欢迎来到我的技术小站</h1>
    <p>怀旧系统科普 | Windows历史 | 电脑基础知识</p>
    <br>

    <a href="download.html">WinXP/2000 网盘下载</a>
    <br>
    <a href="message.html">留言板</a>
    <br>
    <a href="about.html">关于本站</a>

<script>
// ======================================
// 一进网站就弹出 三语欢迎（你好 + Hello + Bonjour）
alert("你好\nHello\nBonjour");
// ======================================

// 星空背景
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Star {
    constructor() {this.reset();}
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.speed = Math.random() * 0.5 + 0.1;
        this.size = Math.random() * 1.5 + 0.5;
    }
    update() {if(this.x<0)this.reset();this.x-=this.speed;}
    draw() {
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,0.8)';
        ctx.fill();
    }
}
for(let i=0;i<150;i++) stars.push(new Star());
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{s.update();s.draw();});
    requestAnimationFrame(animate);
}
animate();

// 自定义鼠标
const cursor = document.querySelector('.cursor');
const trail = document.querySelector('.cursor-trail');
let mouseX=0,mouseY=0,trailX=0,trailY=0;
document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
function animateCursor(){
    cursor.style.left=mouseX+'px';
    cursor.style.top=mouseY+'px';
    trailX+=(mouseX-trailX)*0.15;
    trailY+=(mouseY-trailY)*0.15;
    trail.style.left=trailX+'px';
    trail.style.top=trailY+'px';
    requestAnimationFrame(animateCursor);
}
animateCursor();

// Live2D小人
L2Dwidget.init({
    model: {
        jsonPath: "https://cdn.jsdelivr.net/npm/live2d-widget-model-miku@1.0.5/assets/miku.model.json"
    },
    display: {
        position: "right",
        width: 280,
        height: 350,
        hOffset: 0,
        vOffset: 0
    },
    mobile: {show: true},
    log: false
});
</script>
</body>
</html>
